<!doctype html>
<html lang="ru">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>Каталог — Центр Мебель</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>
    :root{--bg:#f4f4f1;--panel:#fff;--ink:#181817;--muted:#74736e;--line:#e5e4de;--soft:#f8f8f5;--red:#e63946;--blue:#315efb;--shadow:0 18px 50px rgba(27,27,25,.08)}
    *{box-sizing:border-box}body{margin:0;font-family:Inter,Arial,sans-serif;background:var(--bg);color:var(--ink)}button,input,textarea{font:inherit}button{cursor:pointer}.hidden{display:none!important}
    .topbar{height:76px;background:rgba(255,255,255,.92);border-bottom:1px solid var(--line);display:flex;align-items:center;justify-content:space-between;padding:0 28px;position:sticky;top:0;z-index:30;backdrop-filter:blur(18px)}
    .brand{display:flex;align-items:center;gap:14px}.brand-mark{width:40px;height:40px;border-radius:12px;background:#191918;color:#fff;display:grid;place-items:center;font-weight:700}.brand h1{font-size:17px;margin:0}.brand p{font-size:12px;margin:3px 0 0;color:var(--muted)}
    .top-actions{display:flex;align-items:center;gap:10px}.status{font-size:12px;color:var(--muted);padding:8px 11px;border-radius:99px;background:var(--soft);border:1px solid var(--line)}.status.dirty{color:#9a6500;background:#fff7dc;border-color:#f0dda1}
    .btn{border:1px solid var(--line);background:#fff;border-radius:11px;padding:10px 14px;font-weight:600;font-size:13px;color:var(--ink)}.btn:hover{border-color:#b8b7b1}.btn.primary{background:#191918;color:#fff;border-color:#191918}.btn.primary:hover{background:#333331}.btn.danger{color:#b4232d}.btn.small{padding:8px 10px;font-size:12px}
    .app{max-width:1500px;margin:0 auto;padding:24px;display:grid;grid-template-columns:360px minmax(0,1fr);gap:20px;align-items:start}.panel{background:var(--panel);border:1px solid var(--line);border-radius:20px;box-shadow:var(--shadow)}
    .catalog{position:sticky;top:100px;overflow:hidden}.catalog-head{padding:20px;border-bottom:1px solid var(--line)}.catalog-title{display:flex;align-items:center;justify-content:space-between;margin-bottom:14px}.catalog-title h2{font-size:18px;margin:0}.count{font-size:12px;color:var(--muted)}
    .search{width:100%;border:1px solid var(--line);background:var(--soft);border-radius:11px;padding:11px 13px;outline:none}.search:focus{background:#fff;border-color:#86857f}.filters{display:grid;grid-template-columns:1fr auto;gap:8px;margin-top:9px}.select{width:100%;border:1px solid var(--line);background:#fff;border-radius:10px;padding:9px 11px;font-size:12px;color:#4d4c48}
    .product-list{max-height:calc(100vh - 292px);overflow:auto;padding:9px}.product-row{width:100%;display:grid;grid-template-columns:56px minmax(0,1fr) auto;gap:12px;align-items:center;text-align:left;border:1px solid transparent;background:transparent;border-radius:14px;padding:10px}.product-row:hover{background:var(--soft)}.product-row.active{background:#f1f1ed;border-color:#d9d8d1}.thumb{width:56px;height:56px;border-radius:11px;background:#e9e8e3 center/cover no-repeat;display:grid;place-items:center;color:#aaa;font-size:18px}.row-name{display:block;font-size:13px;font-weight:700;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}.row-meta{display:block;font-size:11px;color:var(--muted);margin-top:5px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}.dot{width:8px;height:8px;border-radius:50%;background:#45a46b}.dot.warn{background:#e3a321}.empty{padding:36px 20px;text-align:center;color:var(--muted);font-size:13px}.catalog-foot{padding:14px;border-top:1px solid var(--line)}.catalog-foot .btn{width:100%}
    .editor{min-height:720px;overflow:hidden}.editor-empty{min-height:620px;display:grid;place-items:center;text-align:center;color:var(--muted);padding:40px}.editor-empty strong{display:block;color:var(--ink);font-size:19px;margin-bottom:8px}
    .editor-head{padding:24px 28px;border-bottom:1px solid var(--line);display:flex;align-items:flex-start;justify-content:space-between;gap:20px}.editor-head h2{margin:0;font-size:25px;letter-spacing:-.03em}.editor-head p{margin:7px 0 0;color:var(--muted);font-size:13px}.editor-actions{display:flex;gap:8px}
    .tabs{display:flex;gap:4px;padding:10px 20px;border-bottom:1px solid var(--line);overflow:auto}.tab{border:0;background:transparent;border-radius:9px;padding:9px 12px;color:var(--muted);font-size:12px;font-weight:600;white-space:nowrap}.tab.active{background:#191918;color:#fff}
    .form{padding:26px 28px 34px}.tab-pane{display:none}.tab-pane.active{display:block}.section{margin-bottom:28px}.section:last-child{margin-bottom:0}.section-title{font-size:14px;margin:0 0 15px}.grid{display:grid;grid-template-columns:repeat(2,minmax(0,1fr));gap:16px}.grid.three{grid-template-columns:repeat(3,minmax(0,1fr))}.full{grid-column:1/-1}
    label.field{display:block}.label{display:flex;justify-content:space-between;gap:8px;font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.06em;color:#66655f;margin-bottom:7px}.hint{font-size:11px;color:#9a9993;text-transform:none;letter-spacing:0;font-weight:500}.input,.textarea{width:100%;border:1px solid var(--line);border-radius:11px;background:#fff;padding:11px 13px;font-size:13px;outline:none;color:var(--ink)}.input:focus,.textarea:focus{border-color:#242422;box-shadow:0 0 0 3px rgba(30,30,28,.08)}.input.invalid{border-color:var(--red);background:#fff8f8}.textarea{min-height:170px;resize:vertical;line-height:1.55}
    .image-field{display:grid;grid-template-columns:120px minmax(0,1fr);gap:14px;align-items:start}.image-preview{width:120px;height:100px;border-radius:13px;background:#ecebe6 center/cover no-repeat;border:1px solid var(--line);display:grid;place-items:center;color:#999;font-size:12px}.upload-row{display:flex;gap:8px}.upload-row .input{min-width:0}.upload-label{white-space:nowrap;display:flex;align-items:center}
    .repeat-list{display:grid;gap:10px}.repeat-row{border:1px solid var(--line);border-radius:14px;background:var(--soft);padding:14px}.spec-row{display:grid;grid-template-columns:1fr 1fr auto;gap:10px;align-items:end}.variant-row{display:grid;grid-template-columns:1.1fr 86px 2fr auto;gap:12px;align-items:end}.color-input{height:42px;padding:4px}.row-remove{border:0;background:transparent;color:#b4232d;font-size:12px;font-weight:600;padding:11px 4px}
    .section-head{display:flex;align-items:center;justify-content:space-between;gap:15px;margin-bottom:14px}.section-head .section-title{margin:0}.notice{padding:13px 15px;border-radius:12px;background:#f2f6ff;color:#344c91;font-size:12px;line-height:1.5;margin-bottom:18px}.danger-zone{border:1px solid #f0d1d4;background:#fffafa;border-radius:14px;padding:16px;display:flex;align-items:center;justify-content:space-between;gap:15px}.danger-zone strong{font-size:13px}.danger-zone p{font-size:11px;color:var(--muted);margin:4px 0 0}
    .loading{position:fixed;inset:0;background:rgba(244,244,241,.78);backdrop-filter:blur(5px);z-index:80;display:grid;place-items:center}.loading-card{background:#fff;border:1px solid var(--line);border-radius:16px;padding:20px 25px;box-shadow:var(--shadow);font-weight:600;font-size:13px}.toast{position:fixed;right:24px;bottom:24px;z-index:90;background:#191918;color:#fff;border-radius:13px;padding:13px 15px;box-shadow:var(--shadow);font-size:13px;max-width:360px}.toast.error{background:#a92c35}.toast.success{background:#28734a}
    @media(max-width:900px){.topbar{height:auto;padding:15px;align-items:flex-start;gap:14px}.top-actions{flex-wrap:wrap;justify-content:flex-end}.status{display:none}.app{grid-template-columns:1fr;padding:14px}.catalog{position:static}.product-list{max-height:330px}.editor-head{padding:20px}.form{padding:20px}.grid,.grid.three{grid-template-columns:1fr}.variant-row{grid-template-columns:1fr 80px}.variant-row .images{grid-column:1/-1}.row-remove{grid-column:1/-1}.image-field{grid-template-columns:1fr}.image-preview{width:100%;height:180px}}
  </style>
</head>
<body>
  <header class="topbar">
    <div class="brand"><div class="brand-mark">ЦМ</div><div><h1>Управление каталогом</h1><p>Центр Мебель</p></div></div>
    <div class="top-actions"><span id="save-status" class="status">Изменений нет</span><button id="reload-btn" class="btn">Обновить</button><button id="save-btn" class="btn primary">Опубликовать изменения</button></div>
  </header>
  <main class="app">
    <aside class="panel catalog">
      <div class="catalog-head">
        <div class="catalog-title"><h2>Модели</h2><span id="product-count" class="count">0 товаров</span></div>
        <input id="search" class="search" type="search" placeholder="Поиск по названию…">
        <div class="filters"><select id="category-filter" class="select"><option value="all">Все категории</option></select><select id="quality-filter" class="select"><option value="all">Все</option><option value="ready">Заполненные</option><option value="draft">Требуют внимания</option></select></div>
      </div>
      <div id="product-list" class="product-list"></div>
      <div class="catalog-foot"><button id="add-btn" class="btn primary">＋ Добавить новую модель</button></div>
    </aside>
    <section id="editor" class="panel editor"><div class="editor-empty"><div><strong>Выберите модель</strong>Откройте товар слева или добавьте новую модель.</div></div></section>
  </main>
  <datalist id="category-options"><option value="Диваны"><option value="Прямые диваны"><option value="Модульные диваны"><option value="Диваны-кровати"><option value="Кресла"><option value="Индивидуальные кресла"><option value="Пуфы"><option value="Банкетки и пуфы"></datalist>
  <div id="loading" class="loading"><div class="loading-card">Загружаю каталог…</div></div>
  <div id="toast" class="toast hidden"></div>
  <script>
    const FIREBASE_URL='https://centermebel-43737-default-rtdb.europe-west1.firebasedatabase.app';
    const state={products:[],selected:-1,dirty:false,tab:'main',query:'',category:'all',quality:'all'};
    const $=s=>document.querySelector(s);
    const esc=v=>String(v??'').replace(/[&<>'"]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;',"'":'&#39;','"':'&quot;'}[c]));
    const uid=()=>`product-${Date.now()}-${Math.random().toString(16).slice(2)}`;
    function blankProduct(){return{id:uid(),category:'',name:'',price:'',ozonLink:'',mainImage:'',description:'',dimOverall:'',dimBed:'',softness:'',mech:'',matFrame:'',matLegs:'',guarantee:'',prodTime:'',variants:[],customSpecs:[],tabs:{}}}
    function normalize(p){return{...blankProduct(),...p,id:p?.id||uid(),variants:Array.isArray(p?.variants)?p.variants.map(v=>({...v,thumbnails:Array.isArray(v?.thumbnails)?v.thumbnails:(typeof v?.thumbnails==='string'?splitImages(v.thumbnails):[])})):[],customSpecs:Array.isArray(p?.customSpecs)?p.customSpecs.map(s=>({...s})):[],tabs:{...(p?.tabs||{})}}}
    function splitImages(v){return String(v||'').split(/[\n,]+/).map(s=>s.trim()).filter(Boolean)}
    function isReady(p){return Boolean(p.name?.trim()&&p.category?.trim()&&p.price?.trim()&&p.mainImage?.trim())}
    function productImage(p){return p.mainImage||(p.variants?.[0]?.thumbnails?.[0])||''}
    function setDirty(value=true){state.dirty=value;const el=$('#save-status');el.textContent=value?'Есть несохранённые изменения':'Все изменения опубликованы';el.classList.toggle('dirty',value)}
    function showToast(message,type=''){const el=$('#toast');el.textContent=message;el.className=`toast ${type}`;clearTimeout(showToast.timer);showToast.timer=setTimeout(()=>el.classList.add('hidden'),4200)}
    function setLoading(on,text='Загружаю каталог…'){$('#loading').classList.toggle('hidden',!on);$('#loading .loading-card').textContent=text}
    async function loadFromCloud(force=false){if(state.dirty&&!force&&!confirm('Несохранённые изменения будут потеряны. Обновить каталог?'))return;setLoading(true);try{const response=await fetch(`${FIREBASE_URL}/products.json`);if(!response.ok)throw new Error(`Сервер ответил: ${response.status}`);const data=await response.json();const items=data?(Array.isArray(data)?data:Object.values(data)):[];state.products=items.filter(Boolean).map(normalize);state.selected=state.products.length?0:-1;state.tab='main';setDirty(false);renderAll();showToast('Каталог обновлён','success')}catch(error){showToast(`Не удалось загрузить каталог: ${error.message}`,'error')}finally{setLoading(false)}}
    function buildTabs(p){const specs=(p.customSpecs||[]).filter(s=>s.name||s.value).map(s=>`<tr class="border-b border-zinc-100"><td class="py-2 text-zinc-400">${esc(s.name)}</td><td class="py-2 text-zinc-900">${esc(s.value)}</td></tr>`).join('');return{specs:`<table class="w-full text-left border-collapse"><tr class="border-b border-zinc-100"><td class="py-2 text-zinc-400">Габариты (ШхГхВ)</td><td class="py-2 text-zinc-900">${esc(p.dimOverall||'-')}</td></tr><tr class="border-b border-zinc-100"><td class="py-2 text-zinc-400">Спальное место</td><td class="py-2 text-zinc-900">${esc(p.dimBed||'-')}</td></tr><tr class="border-b border-zinc-100"><td class="py-2 text-zinc-400">Мягкость</td><td class="py-2 text-zinc-900">${esc(p.softness||'-')}</td></tr><tr class="border-b border-zinc-100"><td class="py-2 text-zinc-400">Механизм</td><td class="py-2 text-zinc-900">${esc(p.mech||'-')}</td></tr>${specs}</table>`,tech:`<table class="w-full text-left border-collapse"><tr class="border-b border-zinc-100"><td class="py-2 text-zinc-400">Каркас</td><td class="py-2 text-zinc-900">${esc(p.matFrame||'-')}</td></tr><tr class="border-b border-zinc-100"><td class="py-2 text-zinc-400">Опоры</td><td class="py-2 text-zinc-900">${esc(p.matLegs||'-')}</td></tr></table>`,dimensions:'<p>Информация о заносе уточняется у менеджера при оформлении заказа.</p>',service:`<table class="w-full text-left border-collapse"><tr class="border-b border-zinc-100"><td class="py-2 text-zinc-400">Срок гарантии</td><td class="py-2 text-zinc-900">${esc(p.guarantee||'-')}</td></tr><tr class="border-b border-zinc-100"><td class="py-2 text-zinc-400">Срок изготовления</td><td class="py-2 text-zinc-900">${esc(p.prodTime||'-')}</td></tr></table>`}}
    function prepareForSave(){return state.products.map(p=>{const variants=(p.variants||[]).filter(v=>v.colorName||v.thumbnails?.length).map(v=>({...v,colorName:v.colorName||'',colorHex:v.colorHex||'#cccccc',thumbnails:v.thumbnails?.length?v.thumbnails:(p.mainImage?[p.mainImage]:[])}));return{...p,variants,customSpecs:(p.customSpecs||[]).filter(s=>s.name||s.value),tabs:{...(p.tabs||{}),...buildTabs({...p,variants})}}})}
    async function saveToCloud(){const invalid=state.products.map((p,i)=>isReady(p)?null:i).filter(i=>i!==null);if(invalid.length){state.selected=invalid[0];state.tab='main';renderAll();showToast('Заполните название, категорию, цену и главное фото','error');return}setLoading(true,'Публикую изменения…');try{const response=await fetch(`${FIREBASE_URL}/products.json`,{method:'PUT',headers:{'Content-Type':'application/json'},body:JSON.stringify(prepareForSave())});if(!response.ok)throw new Error(`Сервер ответил: ${response.status}`);state.products=prepareForSave().map(normalize);setDirty(false);renderAll();showToast('Изменения опубликованы на сайте','success')}catch(error){showToast(`Не удалось сохранить: ${error.message}`,'error')}finally{setLoading(false)}}
    function filteredProducts(){return state.products.map((p,index)=>({p,index})).filter(({p})=>{const q=state.query.toLowerCase();const text=`${p.name} ${p.category} ${p.price}`.toLowerCase();return(!q||text.includes(q))&&(state.category==='all'||p.category===state.category)&&(state.quality==='all'||(state.quality==='ready'?isReady(p):!isReady(p)))})}
    function renderFilters(){const current=state.category;const cats=[...new Set(state.products.map(p=>p.category).filter(Boolean))].sort((a,b)=>a.localeCompare(b,'ru'));$('#category-filter').innerHTML='<option value="all">Все категории</option>'+cats.map(c=>`<option value="${esc(c)}">${esc(c)}</option>`).join('');$('#category-filter').value=cats.includes(current)?current:'all';state.category=$('#category-filter').value}
    function renderList(){const list=filteredProducts();$('#product-count').textContent=`${list.length} из ${state.products.length}`;const el=$('#product-list');if(!list.length){el.innerHTML='<div class="empty">Ничего не найдено.<br>Измените фильтры или добавьте модель.</div>';return}el.innerHTML=list.map(({p,index})=>`<button class="product-row ${index===state.selected?'active':''}" data-select="${index}"><span class="thumb" style="${productImage(p)?`background-image:url('${esc(productImage(p))}')`:''}">${productImage(p)?'':'□'}</span><span><span class="row-name">${esc(p.name||'Новая модель')}</span><span class="row-meta">${esc(p.category||'Без категории')} · ${esc(p.price||'Цена не указана')}</span></span><span class="dot ${isReady(p)?'':'warn'}" title="${isReady(p)?'Готово':'Нужно заполнить'}"></span></button>`).join('')}
    function field(label,key,value,options={}){const invalid=options.required&&!String(value||'').trim();return`<label class="field ${options.full?'full':''}"><span class="label">${label}${options.hint?`<span class="hint">${options.hint}</span>`:''}</span>${options.area?`<textarea class="textarea ${invalid?'invalid':''}" data-field="${key}" placeholder="${esc(options.placeholder||'')}">${esc(value)}</textarea>`:`<input class="input ${invalid?'invalid':''}" data-field="${key}" ${options.list?`list="${options.list}"`:''} type="${options.type||'text'}" value="${esc(value)}" placeholder="${esc(options.placeholder||'')}">`}</label>`}
    function renderEditor(){const el=$('#editor');const p=state.products[state.selected];if(!p){el.innerHTML='<div class="editor-empty"><div><strong>Выберите модель</strong>Откройте товар слева или добавьте новую модель.</div></div>';return}const tabs=[['main','Основное'],['specs','Характеристики'],['materials','Материалы и сервис'],['media','Цвета и фотографии']];el.innerHTML=`<div class="editor-head"><div><h2>${esc(p.name||'Новая модель')}</h2><p>${isReady(p)?'Основные данные заполнены':'Заполните обязательные поля, отмеченные красным'}</p></div><div class="editor-actions"><button class="btn small" id="duplicate-btn">Дублировать</button></div></div><div class="tabs">${tabs.map(([id,name])=>`<button class="tab ${state.tab===id?'active':''}" data-tab="${id}">${name}</button>`).join('')}</div><div class="form">
      <div class="tab-pane ${state.tab==='main'?'active':''}" data-pane="main"><div class="notice">Эти данные формируют карточку товара и заголовок в каталоге.</div><div class="grid">${field('Название модели','name',p.name,{required:true,placeholder:'Например, МОНС'})}${field('Категория','category',p.category,{required:true,list:'category-options',placeholder:'Выберите или введите категорию'})}${field('Цена','price',p.price,{required:true,placeholder:'165 900 ₽'})}${field('Ссылка на товар','ozonLink',p.ozonLink,{placeholder:'https://…'})}<div class="full"><span class="label">Главное фото <span class="hint">обязательно</span></span><div class="image-field"><div class="image-preview" id="main-preview" style="${p.mainImage?`background-image:url('${esc(p.mainImage)}')`:''}">${p.mainImage?'':'Нет фото'}</div><div class="upload-row"><input class="input ${p.mainImage?'':'invalid'}" data-field="mainImage" value="${esc(p.mainImage)}" placeholder="Ссылка на изображение"><label class="btn upload-label">Загрузить<input class="hidden" id="main-upload" type="file" accept="image/*"></label></div></div></div>${field('Описание модели','description',p.description,{area:true,full:true,hint:'поддерживает HTML',placeholder:'Расскажите о модели, посадке и особенностях…'})}</div></div>
      <div class="tab-pane ${state.tab==='specs'?'active':''}" data-pane="specs"><div class="section"><h3 class="section-title">Базовые характеристики</h3><div class="grid">${field('Габариты Ш×Г×В','dimOverall',p.dimOverall,{placeholder:'142×114×88 см'})}${field('Спальное место','dimBed',p.dimBed,{placeholder:'120×192 см'})}${field('Уровень мягкости','softness',p.softness,{placeholder:'Средне-жёсткий'})}${field('Механизм','mech',p.mech,{placeholder:'Вперёд-выкатной'})}</div></div><div class="section"><div class="section-head"><h3 class="section-title">Дополнительные характеристики</h3><button class="btn small" id="add-spec">＋ Добавить</button></div><div id="spec-list" class="repeat-list">${(p.customSpecs||[]).map((s,i)=>`<div class="repeat-row spec-row"><label class="field"><span class="label">Название</span><input class="input" data-spec="name" data-index="${i}" value="${esc(s.name)}" placeholder="Артикул"></label><label class="field"><span class="label">Значение</span><input class="input" data-spec="value" data-index="${i}" value="${esc(s.value)}" placeholder="12345"></label><button class="row-remove" data-remove-spec="${i}">Удалить</button></div>`).join('')||'<div class="empty">Дополнительных характеристик пока нет.</div>'}</div></div></div>
      <div class="tab-pane ${state.tab==='materials'?'active':''}" data-pane="materials"><div class="grid">${field('Материал каркаса','matFrame',p.matFrame,{placeholder:'Берёзовая фанера'})}${field('Вид опор','matLegs',p.matLegs,{placeholder:'Массив дуба'})}${field('Срок гарантии','guarantee',p.guarantee,{placeholder:'18 месяцев'})}${field('Срок изготовления','prodTime',p.prodTime,{placeholder:'33 рабочих дня'})}</div></div>
      <div class="tab-pane ${state.tab==='media'?'active':''}" data-pane="media"><div class="section-head"><div><h3 class="section-title">Варианты обивки</h3><span class="hint">Для каждого цвета можно указать несколько фотографий</span></div><button class="btn small" id="add-variant">＋ Добавить цвет</button></div><div id="variant-list" class="repeat-list">${(p.variants||[]).map((v,i)=>`<div class="repeat-row variant-row"><label class="field"><span class="label">Название ткани</span><input class="input" data-variant="colorName" data-index="${i}" value="${esc(v.colorName)}" placeholder="Микробукле серо-бежевый"></label><label class="field"><span class="label">Цвет</span><input class="input color-input" type="color" data-variant="colorHex" data-index="${i}" value="${esc(v.colorHex||'#cccccc')}"></label><label class="field images"><span class="label">Ссылки на фото <span class="hint">через запятую или с новой строки</span></span><input class="input" data-variant="thumbnails" data-index="${i}" value="${esc((v.thumbnails||[]).join(', '))}" placeholder="https://…"></label><button class="row-remove" data-remove-variant="${i}">Удалить</button></div>`).join('')||'<div class="empty">Добавьте хотя бы один цвет, если у модели есть варианты обивки.</div>'}</div></div>
      <div class="section" style="margin-top:30px"><div class="danger-zone"><div><strong>Удалить модель</strong><p>Товар исчезнет после публикации изменений.</p></div><button class="btn danger" id="delete-btn">Удалить</button></div></div></div>`;bindEditor()}
    function bindEditor(){document.querySelectorAll('[data-tab]').forEach(b=>b.onclick=()=>{state.tab=b.dataset.tab;renderEditor()});document.querySelectorAll('[data-field]').forEach(input=>input.oninput=()=>{const p=state.products[state.selected];p[input.dataset.field]=input.value;setDirty();renderList();if(input.dataset.field==='mainImage'){const preview=$('#main-preview');preview.style.backgroundImage=input.value?`url('${input.value}')`:'';preview.textContent=input.value?'':'Нет фото'}if(input.dataset.field==='name'){$('.editor-head h2').textContent=input.value||'Новая модель'}});document.querySelectorAll('[data-spec]').forEach(input=>input.oninput=()=>{state.products[state.selected].customSpecs[Number(input.dataset.index)][input.dataset.spec]=input.value;setDirty()});document.querySelectorAll('[data-variant]').forEach(input=>input.oninput=()=>{const v=state.products[state.selected].variants[Number(input.dataset.index)];v[input.dataset.variant]=input.dataset.variant==='thumbnails'?splitImages(input.value):input.value;setDirty()});document.querySelectorAll('[data-remove-spec]').forEach(b=>b.onclick=()=>{state.products[state.selected].customSpecs.splice(Number(b.dataset.removeSpec),1);setDirty();renderEditor()});document.querySelectorAll('[data-remove-variant]').forEach(b=>b.onclick=()=>{state.products[state.selected].variants.splice(Number(b.dataset.removeVariant),1);setDirty();renderEditor()});$('#add-spec')?.addEventListener('click',()=>{state.products[state.selected].customSpecs.push({name:'',value:''});setDirty();renderEditor()});$('#add-variant')?.addEventListener('click',()=>{state.products[state.selected].variants.push({colorName:'',colorHex:'#cccccc',thumbnails:[]});setDirty();renderEditor()});$('#delete-btn').onclick=deleteSelected;$('#duplicate-btn').onclick=duplicateSelected;$('#main-upload').onchange=e=>uploadImage(e.target,p=>{state.products[state.selected].mainImage=p;setDirty();renderAll()})}
    function renderAll(){renderFilters();renderList();renderEditor()}
    function deleteSelected(){const p=state.products[state.selected];if(!confirm(`Удалить «${p.name||'Новую модель'}»? Изменение вступит в силу только после публикации.`))return;state.products.splice(state.selected,1);state.selected=Math.min(state.selected,state.products.length-1);setDirty();renderAll();showToast('Модель удалена из списка. Опубликуйте изменения.')}
    function duplicateSelected(){const source=state.products[state.selected];const copy=normalize(JSON.parse(JSON.stringify(source)));copy.id=uid();copy.name=`${source.name||'Модель'} — копия`;state.products.splice(state.selected+1,0,copy);state.selected++;setDirty();renderAll();showToast('Создана копия модели')}
    async function uploadImage(input,onDone){const file=input.files?.[0];if(!file)return;setLoading(true,'Загружаю фотографию…');try{const body=new FormData();body.append('photo',file);const response=await fetch('/upload.php',{method:'POST',body});if(!response.ok)throw new Error(`Сервер ответил: ${response.status}`);const url=(await response.text()).trim();if(!url)throw new Error('сервер не вернул ссылку');onDone(url);showToast('Фотография загружена','success')}catch(error){showToast(`Не удалось загрузить фото: ${error.message}`,'error')}finally{input.value='';setLoading(false)}}
    $('#product-list').onclick=e=>{const row=e.target.closest('[data-select]');if(row){state.selected=Number(row.dataset.select);state.tab='main';renderAll()}};
    $('#add-btn').onclick=()=>{state.products.unshift(blankProduct());state.selected=0;state.tab='main';setDirty();renderAll()};
    $('#search').oninput=e=>{state.query=e.target.value;renderList()};$('#category-filter').onchange=e=>{state.category=e.target.value;renderList()};$('#quality-filter').onchange=e=>{state.quality=e.target.value;renderList()};$('#reload-btn').onclick=()=>loadFromCloud();$('#save-btn').onclick=saveToCloud;
    window.addEventListener('beforeunload',e=>{if(state.dirty){e.preventDefault();e.returnValue=''}});loadFromCloud(true);
  </script>
</body>
</html>
