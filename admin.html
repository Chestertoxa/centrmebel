<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Облачная панель управления — Центр Мебель</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
    <style>body { font-family: 'Inter', sans-serif; background-color: #f5f5f7; }</style>
</head>
<body class="py-12 px-4 sm:px-6 lg:px-8">

    <div class="max-w-4xl mx-auto">
        <div class="flex flex-col md:flex-row md:items-center justify-between mb-8 border-b border-zinc-200 pb-6 gap-4">
            <div class="flex items-center gap-3">
                <div class="w-10 h-10 bg-[#E63946] rounded-full flex items-center justify-center text-white font-bold">ЦM</div>
                <div>
                    <h1 class="text-xl font-medium text-zinc-900 leading-none">Облачный конструктор</h1>
                    <p class="text-xs text-zinc-500 mt-1">Синхронизация с JSONBin.io</p>
                </div>
            </div>
            
            <div class="flex flex-col sm:flex-row gap-2">
                <input type="text" id="bin-id" placeholder="Bin ID (из URL)" class="text-xs px-3 py-2 border rounded-lg w-48">
                <input type="password" id="api-key" placeholder="Master Key ($2a$...)" class="text-xs px-3 py-2 border rounded-lg w-48">
                <button onclick="loadFromCloud()" class="bg-zinc-800 text-white text-xs px-4 py-2 rounded-lg hover:bg-black transition">Загрузить</button>
            </div>
        </div>

        <div id="loading" class="hidden text-center py-10 text-zinc-500 text-sm animate-pulse">Связываемся с облаком...</div>

        <div class="space-y-6" id="products-list"></div>

        <button onclick="addNewProductForm()" class="w-full mt-6 border-2 border-dashed border-zinc-300 hover:border-zinc-500 bg-white text-zinc-600 hover:text-zinc-900 text-sm font-medium py-5 rounded-2xl transition flex items-center justify-center gap-2">
            + Добавить новую модель мебели
        </button>

        <button onclick="saveToCloud()" class="w-full mt-8 bg-[#E63946] hover:bg-red-700 text-white text-sm font-medium py-5 rounded-2xl transition shadow-lg shadow-red-500/30 flex items-center justify-center gap-2">
            <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M7 16a4 4 0 01-.88-7.903A5 5 0 1115.9 6L16 6a5 5 0 011 9.9M15 13l-3-3m0 0l-3 3m3-3v12"/></svg>
            Сохранить изменения в Облако
        </button>
    </div>

    <script>
        let productCount = 0;

        // Восстанавливаем ключи из памяти при загрузке страницы
        window.onload = () => {
            if(localStorage.getItem('cm_bin_id')) document.getElementById('bin-id').value = localStorage.getItem('cm_bin_id');
            if(localStorage.getItem('cm_api_key')) document.getElementById('api-key').value = localStorage.getItem('cm_api_key');
            if(document.getElementById('bin-id').value && document.getElementById('api-key').value) loadFromCloud();
        };

        // ЗАГРУЗКА ИЗ ОБЛАКА
        // Замените эту переменную на вашу ссылку из Firebase
const FIREBASE_URL = "https://console.firebase.google.com/u/0/project/centermebel-43737/database/centermebel-43737-default-rtdb/data/~2F"; 

async function loadFromCloud() {
    document.getElementById('loading').classList.remove('hidden');
    try {
        const response = await fetch(`${FIREBASE_URL}/products.json`);
        const data = await response.json();
        document.getElementById('loading').classList.add('hidden');
        document.getElementById('products-list').innerHTML = '';
        if(data) {
            // Firebase возвращает данные объектом, превращаем в массив
            Object.values(data).forEach(prod => addNewProductForm(prod));
        }
    } catch (err) { alert('Ошибка загрузки: ' + err.message); }
}

async function saveToCloud(btnElement) {
    btnElement.innerHTML = 'Сохранение...';
    const productsArray = collectDataFromForms();
    try {
        // Метод PUT перезаписывает всю базу целиком
        await fetch(`${FIREBASE_URL}/products.json`, {
            method: 'PUT',
            body: JSON.stringify(productsArray)
        });
        alert('Данные успешно сохранены в Firebase!');
    } catch(e) { alert('Ошибка: ' + e.message); }
    btnElement.innerHTML = 'Сохранить изменения в Облако';
}
        });
        
        const data = await response.json();
        document.getElementById('loading').classList.add('hidden');
        
        if(data.record) {
            document.getElementById('products-list').innerHTML = '';
            data.record.forEach(prod => addNewProductForm(prod));
        }
    } catch (err) {
        document.getElementById('loading').classList.add('hidden');
        alert('Ошибка: ' + err.message);
    }
}

        // СОХРАНЕНИЕ В ОБЛАКО
        async function saveToCloud(btnElement) { // Добавили параметр btnElement
            const binId = document.getElementById('bin-id').value.trim();
            const apiKey = document.getElementById('api-key').value.trim();
            if(!binId || !apiKey) return alert('Ключи не найдены');

            // Используем переданный элемент кнопки
            btnElement.innerHTML = 'Сохранение...';
            btnElement.classList.add('opacity-70', 'pointer-events-none');

            const productsArray = collectDataFromForms();

            try {
                const response = await fetch(`https://api.jsonbin.io/v3/b/${binId}`, {
                    method: 'PUT',
                    headers: {
                        'Content-Type': 'application/json',
                        'X-Master-Key': apiKey
                    },
                    body: JSON.stringify(productsArray)
                });
                
                if(response.ok) {
                    alert('Успешно! Ваш сайт обновлен.');
                } else {
                    const error = await response.json();
                    alert('Ошибка: ' + JSON.stringify(error));
                }
            } catch(e) {
                alert('Ошибка соединения: ' + e.message);
            } finally {
                btnElement.innerHTML = 'Сохранить изменения в Облако';
                btnElement.classList.remove('opacity-70', 'pointer-events-none');
            }
        }

        // Сбор данных со всех карточек
        function collectDataFromForms() {
            const cards = document.getElementById('products-list').children;
            let productsArray = [];

            for (let card of cards) {
                let id = card.getAttribute('data-id') || "prod-" + Math.random().toString(36).substring(2, 7);
                let name = card.querySelector('.prod-name').value;
                let price = card.querySelector('.prod-price').value;
                let category = card.querySelector('.prod-category').value;
                let ozonLink = card.querySelector('.prod-ozon').value;
                let specs = card.querySelector('.prod-specs').value;
                let dimensions = card.querySelector('.prod-dimensions').value;

                let variantRows = card.querySelectorAll('.variant-row');
                let variants = [];
                variantRows.forEach(row => {
                    let cName = row.querySelector('.var-name').value;
                    let cHex = row.querySelector('.var-hex').value;
                    let imgsRaw = row.querySelector('.var-images').value;
                    
                    let imgsArr = imgsRaw.split(',')
                        .map(s => s.trim()).filter(s => s !== '')
                        .map(s => s.startsWith('images/') ? s : 'images/' + s);

                    if (cName) {
                        variants.push({
                            colorName: cName,
                            colorHex: cHex || "#ffffff",
                            mainImage: imgsArr.length > 0 ? imgsArr[0] : "images/hero-bed1.webp",
                            thumbnails: imgsArr.length > 0 ? imgsArr : ["images/hero-bed1.webp"]
                        });
                    }
                });

                if (!variants.length) variants.push({ colorName: "Базовый", colorHex: "#ffffff", mainImage: "images/hero-bed1.webp", thumbnails: ["images/hero-bed1.webp"] });

                productsArray.push({
                    id: id,
                    category: category,
                    name: name,
                    price: price,
                    mainImage: variants[0].mainImage,
                    variants: variants,
                    ozonLink: ozonLink || "https://ozon.ru",
                    tabs: {
                        specs: specs,
                        tech: `<p class="mb-2"><strong class="font-medium text-zinc-900">Каркас «Центр мебель»:</strong> Калиброванный брус и сухая березовая фанера высшего сорта (0% влажности). Полное отсутствие скрипа.</p><p><strong class="font-medium text-zinc-900">Наполнение:</strong> Многослойная высокоэластичная пена HR без химического запаха.</p>`,
                        dimensions: dimensions,
                        service: `<p><strong class="font-medium text-zinc-900">Сервис под ключ:</strong> Доставка, занос, сборка за 10 минут и вывоз мусора включены. Мастера работают строго в бахилах.</p>`
                    }
                });
            }
            return productsArray;
        }

        // ГЕНЕРАЦИЯ КАРТОЧКИ ФОРМЫ (Для добавления и загрузки)
        function addNewProductForm(data = null) {
            productCount++;
            const container = document.getElementById('products-list');
            const formCard = document.createElement('div');
            formCard.className = "bg-white p-6 md:p-8 rounded-2xl shadow-sm border border-zinc-200 relative fade-in";
            formCard.id = `product-card-${productCount}`;
            if(data && data.id) formCard.setAttribute('data-id', data.id); // Сохраняем старый ID

            formCard.innerHTML = `
                <button onclick="document.getElementById('product-card-${productCount}').remove()" class="absolute top-6 right-6 text-zinc-400 hover:text-rose-500 transition text-xs font-medium bg-zinc-100 hover:bg-rose-50 px-3 py-1.5 rounded-md cursor-pointer">Удалить диван</button>
                
                <h3 class="text-base font-medium text-zinc-800 mb-6">${data ? data.name : 'Новая модель'}</h3>
                
                <div class="grid grid-cols-1 md:grid-cols-2 gap-5 mb-6">
                    <div>
                        <label class="block text-[10px] font-bold text-zinc-500 uppercase tracking-wider mb-2">Название</label>
                        <input type="text" class="prod-name w-full border border-zinc-300 rounded-xl px-4 py-3 text-sm" value="${data ? data.name : ''}">
                    </div>
                    <div>
                        <label class="block text-[10px] font-bold text-zinc-500 uppercase tracking-wider mb-2">Цена</label>
                        <input type="text" class="prod-price w-full border border-zinc-300 rounded-xl px-4 py-3 text-sm" value="${data ? data.price : ''}">
                    </div>
                    <div>
                        <label class="block text-[10px] font-bold text-zinc-500 uppercase tracking-wider mb-2">Категория</label>
                        <select class="prod-category w-full border border-zinc-300 bg-white rounded-xl px-4 py-3 text-sm">
                            <option value="Прямые диваны" ${data && data.category === 'Прямые диваны' ? 'selected' : ''}>Прямые диваны</option>
                            <option value="Диваны-кровати" ${data && data.category === 'Диваны-кровати' ? 'selected' : ''}>Диваны-кровати</option>
                            <option value="Индивидуальные кресла" ${data && data.category === 'Индивидуальные кресла' ? 'selected' : ''}>Индивидуальные кресла</option>
                            <option value="Банкетки и пуфы" ${data && data.category === 'Банкетки и пуфы' ? 'selected' : ''}>Банкетки и пуфы</option>
                        </select>
                    </div>
                    <div>
                        <label class="block text-[10px] font-bold text-zinc-500 uppercase tracking-wider mb-2">Ozon</label>
                        <input type="text" class="prod-ozon w-full border border-zinc-300 rounded-xl px-4 py-3 text-sm" value="${data ? data.ozonLink : ''}">
                    </div>
                </div>

                <div class="border-t border-zinc-100 pt-6 mt-6">
                    <h4 class="text-xs font-bold text-zinc-400 uppercase tracking-widest mb-4">Варианты цветов и фотографии</h4>
                    <div id="variants-container-${productCount}" class="space-y-4"></div>
                    <button onclick="addVariantField(${productCount})" class="mt-3 text-xs text-[#E63946] font-medium hover:underline cursor-pointer">+ Добавить вариант цвета</button>
                </div>

                <div class="border-t border-zinc-100 pt-6 mt-6 grid grid-cols-1 md:grid-cols-2 gap-5">
                    <div>
                        <label class="block text-[10px] font-bold text-zinc-500 uppercase tracking-wider mb-2">Характеристики (HTML)</label>
                        <textarea class="prod-specs w-full border border-zinc-300 rounded-xl px-4 py-3 text-xs h-24">${data ? data.tabs.specs : '<ul class="space-y-2 font-light"><li><strong class="font-medium text-zinc-900">Жесткость:</strong> 4 из 10</li></ul>'}</textarea>
                    </div>
                    <div>
                        <label class="block text-[10px] font-bold text-zinc-500 uppercase tracking-wider mb-2">Размеры и занос (HTML)</label>
                        <textarea class="prod-dimensions w-full border border-zinc-300 rounded-xl px-4 py-3 text-xs h-24">${data ? data.tabs.dimensions : '<p><strong class="font-medium text-zinc-900">Габариты:</strong> 240 х 105 х 85 см.</p>'}</textarea>
                    </div>
                </div>
            `;
            container.appendChild(formCard);

            if (data && data.variants) {
                data.variants.forEach(v => addVariantField(productCount, v));
            } else {
                addVariantField(productCount);
            }
        }

        function addVariantField(prodId, val = null) {
            const container = document.getElementById(`variants-container-${prodId}`);
            const varDiv = document.createElement('div');
            varDiv.className = "variant-row grid grid-cols-1 md:grid-cols-4 gap-3 bg-zinc-50 border border-zinc-200 p-4 rounded-xl relative";
            
            // Если пути уже содержат images/, обрезаем для удобства ввода
            let thumbStr = val ? val.thumbnails.map(t => t.replace('images/', '')).join(', ') : '';

            varDiv.innerHTML = `
                <div>
                    <input type="text" class="var-name w-full border border-zinc-300 bg-white rounded-lg px-3 py-2 text-xs focus:outline-none" placeholder="Ткань (напр: Велюр)" value="${val ? val.colorName : ''}">
                </div>
                <div>
                    <input type="text" class="var-hex w-full border border-zinc-300 bg-white rounded-lg px-3 py-2 text-xs focus:outline-none" placeholder="Код цвета (#E63946)" value="${val ? val.colorHex : ''}">
                </div>
                <div class="md:col-span-2">
                    <input type="text" class="var-images w-full border border-zinc-300 bg-white rounded-lg px-3 py-2 text-xs focus:outline-none" placeholder="Фото (напр: hero-bed1.webp, hero-bed.webp)" value="${thumbStr}">
                </div>
                <button onclick="this.parentElement.remove()" class="absolute -top-2 -right-2 w-6 h-6 bg-rose-500 hover:bg-rose-600 text-white rounded-full text-[10px] shadow-sm flex items-center justify-center transition cursor-pointer">✕</button>
            `;
            container.appendChild(varDiv);
        }
    </script>
</body>
</html>
