<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Облачная панель управления — Центр Мебель</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
    <style>body { font-family: 'Inter', sans-serif; background-color: #f5f5f7; }</style>
</head>
<body class="py-12 px-4 sm:px-6 lg:px-8">

    <div class="max-w-4xl mx-auto">
        <div class="flex flex-col md:flex-row md:items-center justify-between mb-8 border-b border-zinc-200 pb-6 gap-4">
            <div class="flex items-center gap-3">
                <div class="w-10 h-10 bg-[#E63946] rounded-full flex items-center justify-center text-white font-bold">ЦM</div>
                <div>
                    <h1 class="text-xl font-medium text-zinc-900 leading-none">Облачный конструктор</h1>
                    
                </div>
            </div>
            
            
        </div>

        <div id="loading" class="hidden text-center py-10 text-zinc-500 text-sm animate-pulse">Связываемся с облаком...</div>

        <div class="space-y-6" id="products-list"></div>

        <button onclick="addNewProductForm()" class="w-full mt-6 border-2 border-dashed border-zinc-300 hover:border-zinc-500 bg-white text-zinc-600 hover:text-zinc-900 text-sm font-medium py-5 rounded-2xl transition flex items-center justify-center gap-2">
            + Добавить новую модель мебели
        </button>

        <button onclick="saveToCloud()" class="w-full mt-8 bg-[#E63946] hover:bg-red-700 text-white text-sm font-medium py-5 rounded-2xl transition shadow-lg shadow-red-500/30 flex items-center justify-center gap-2">
            <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M7 16a4 4 0 01-.88-7.903A5 5 0 1115.9 6L16 6a5 5 0 011 9.9M15 13l-3-3m0 0l-3 3m3-3v12"/></svg>
            Сохранить изменения в Облако
        </button>
    </div>

    <script>
    // ВСТАВЬ СЮДА ССЫЛКУ НА СВОЮ FIREBASE БАЗУ (без /products.json в конце)
    const FIREBASE_URL = "https://console.firebase.google.com/u/0/project/centermebel-43737/database/centermebel-43737-default-rtdb/data/~2F"; 

    window.onload = () => {
        // При загрузке сразу тянем данные, так как в Firebase ключи не нужны
        loadFromCloud();
    };

    async function loadFromCloud() {
        document.getElementById('loading').classList.remove('hidden');
        try {
            const response = await fetch(`${FIREBASE_URL}/products.json`);
            const data = await response.json();
            document.getElementById('loading').classList.add('hidden');
            document.getElementById('products-list').innerHTML = '';
            
            if(data) {
                // Превращаем объект из Firebase в массив и рисуем
                Object.values(data).forEach(prod => addNewProductForm(prod));
            }
        } catch (err) { 
            console.error(err);
            alert('Ошибка загрузки базы. Проверьте URL в коде.'); 
        }
    }

    async function saveToCloud() {
        const btn = event.currentTarget;
        btn.innerHTML = 'Сохранение...';
        
        const productsArray = collectDataFromForms();
        
        try {
            const response = await fetch(`${FIREBASE_URL}/products.json`, {
                method: 'PUT',
                body: JSON.stringify(productsArray)
            });
            if(response.ok) alert('Успешно сохранено в Firebase!');
        } catch(e) { alert('Ошибка сохранения: ' + e.message); }
        
        btn.innerHTML = 'Сохранить изменения в Облако';
    }

    // ... (функции addNewProductForm, addVariantField и collectDataFromForms оставляем как были)
</script>
</body>
</html>
