<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Облачная панель управления — Центр Мебель</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="py-12 px-4 bg-zinc-100">

    <div class="max-w-4xl mx-auto bg-white p-8 rounded-3xl shadow-sm">
        <h1 class="text-2xl font-bold mb-6">Облачный конструктор каталога</h1>
        
        <div id="loading" class="hidden text-sm text-zinc-500 mb-4">Загрузка данных...</div>
        <div id="products-list" class="space-y-6"></div>

        <button onclick="addNewProductForm()" class="mt-8 w-full py-4 border-2 border-dashed border-zinc-300 rounded-2xl text-zinc-500 hover:border-[#E63946] hover:text-[#E63946] transition">+ Добавить новую модель мебели</button>
        <button onclick="saveToCloud(this)" class="mt-4 w-full py-4 bg-[#E63946] text-white rounded-2xl font-bold hover:bg-rose-600 transition">Сохранить изменения в Облако</button>
    </div>

<script>
    // ВСТАВЬТЕ СЮДА СВОЮ ССЫЛКУ ИЗ FIREBASE
    const FIREBASE_URL = "https://centermebel-43737-default-rtdb.europe-west1.firebasedatabase.app"; 
    let productCount = 0;

    window.onload = () => loadFromCloud();

    async function loadFromCloud() {
        document.getElementById('loading').classList.remove('hidden');
        try {
            const response = await fetch(`${FIREBASE_URL}/products.json`);
            const data = await response.json();
            document.getElementById('loading').classList.add('hidden');
            document.getElementById('products-list').innerHTML = '';
            if(data) Object.values(data).forEach(prod => addNewProductForm(prod));
        } catch (err) { alert('Ошибка загрузки: ' + err.message); }
    }

    async function saveToCloud(btn) {
        btn.innerHTML = 'Сохранение...';
        const productsArray = collectDataFromForms();
        try {
            const response = await fetch(`${FIREBASE_URL}/products.json`, {
                method: 'PUT',
                body: JSON.stringify(productsArray)
            });
            if(response.ok) alert('Успешно сохранено!');
        } catch(e) { alert('Ошибка: ' + e.message); }
        btn.innerHTML = 'Сохранить изменения в Облако';
    }

    function addNewProductForm(data = null) {
        productCount++;
        const container = document.getElementById('products-list');
        const card = document.createElement('div');
        card.className = "p-6 border rounded-2xl bg-zinc-50 relative";
        card.id = `card-${productCount}`;
        card.innerHTML = `
            <button onclick="this.parentElement.remove()" class="absolute top-4 right-4 text-xs text-rose-500">Удалить</button>
            <div class="grid grid-cols-2 gap-4">
                <input type="text" class="prod-name p-2 border rounded" placeholder="Название" value="${data ? data.name : ''}">
                <input type="text" class="prod-price p-2 border rounded" placeholder="Цена" value="${data ? data.price : ''}">
                <input type="text" class="prod-ozon p-2 border rounded" placeholder="Ссылка Ozon" value="${data ? data.ozonLink : ''}">
            </div>
            <div class="variants-container mt-4 space-y-2"></div>
            <button onclick="addVariantField(${productCount})" class="mt-2 text-xs text-[#E63946] font-bold">+ Цвет</button>
        `;
        container.appendChild(card);
        if(data && data.variants) data.variants.forEach(v => addVariantField(productCount, v));
    }

    function addVariantField(id, val = null) {
        const cont = document.querySelector(`#card-${id} .variants-container`);
        const div = document.createElement('div');
        div.className = "flex gap-2";
        div.innerHTML = `
            <input type="text" class="var-name p-1 border rounded w-1/3" placeholder="Цвет" value="${val ? val.colorName : ''}">
            <input type="text" class="var-hex p-1 border rounded w-1/3" placeholder="HEX" value="${val ? val.colorHex : ''}">
            <input type="text" class="var-images p-1 border rounded w-1/3" placeholder="Фото" value="${val ? val.thumbnails.join(', ') : ''}">
        `;
        cont.appendChild(div);
    }

    function collectDataFromForms() {
        let list = [];
        document.querySelectorAll('#products-list > div').forEach(card => {
            let vars = [];
            card.querySelectorAll('.variants-container > div').forEach(row => {
                vars.push({
                    colorName: row.querySelector('.var-name').value,
                    colorHex: row.querySelector('.var-hex').value,
                    thumbnails: row.querySelector('.var-images').value.split(',').map(s => s.trim())
                });
            });
            list.push({
                name: card.querySelector('.prod-name').value,
                price: card.querySelector('.prod-price').value,
                ozonLink: card.querySelector('.prod-ozon').value,
                variants: vars
            });
        });
        return list;
    }
</script>
</body>
</html>
